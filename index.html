<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shaker Screen Guide</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    padding: 40px;
    position: relative;
}

h1 {
    font-size: 36px;
    margin-bottom: 40px;
}

/* Top-left Back Button */
.back-top {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #555;
    color: white;
    cursor: pointer;
    display: none;
}

.back-top:hover {
    background-color: #333;
}

.button-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.button {
    padding: 22px 40px;
    font-size: 22px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    min-width: 180px;
    font-weight: bold;
    transition: 0.2s;
}

.button:hover {
    transform: scale(1.05);
}

/* Quality Colors */
.good { background-color: #2ecc71; color: white; }
.medium-quality { background-color: #d2b48c; color: black; }
.bad { background-color: #e74c3c; color: white; }
.mix { background-color: orange; color: white; }

/* Leaf Sizes */
.big { width: 260px; height: 100px; }
.medium { width: 220px; height: 85px; }
.small { width: 180px; height: 70px; }

/* Restart */
.restart { background-color: #333; color: white; }

.result {
    font-size: 40px;
    font-weight: bold;
    margin-top: 40px;
}
</style>
</head>

<body>

<button id="backButton" class="back-top" onclick="goBack()">← Back</button>

<h1 id="question">How is the product quality?</h1>
<div id="options" class="button-container"></div>
<div id="result" class="result"></div>

<script>

let answers = {};
let step = 0;

function showQualityQuestion() {
    step = 1;
    toggleBack(false);

    setQuestion(
        "How is the product quality?",
        [
            { text: "Good", value: "good", class: "good" },
            { text: "Medium", value: "medium", class: "medium-quality" },
            { text: "Bad", value: "bad", class: "bad" },
            { text: "Good/Bad Mix", value: "mix", class: "mix" }
        ],
        (value) => {
            if (value === "mix") {
                showDirectResult("Use 50-50 shaker screen");
                return;
            }
            answers.quality = value;
            showLeafSizeQuestion();
        }
    );
}

function showLeafSizeQuestion() {
    step = 2;
    toggleBack(true);

    setQuestion(
        "Is the leaf size big, medium, or small?",
        [
            { text: "Big", value: "big", class: "big" },
            { text: "Medium", value: "medium", class: "medium" },
            { text: "Small", value: "small", class: "small" }
        ],
        (value) => {
            answers.leafSize = value;
            showMovementQuestion();
        }
    );
}

function showMovementQuestion() {
    step = 3;
    toggleBack(true);

    setQuestion(
        "Is the product moving across the shaker bins well?",
        [
            { text: "Yes", value: "yes" },
            { text: "No", value: "no" }
        ],
        (value) => {
            answers.movement = value;
            showResult();
        }
    );
}

const decisionMap = {
    good: {
        big: { yes: "Use at least: 1 Small & 2 Medium Screens",
               no: "Use at least: 1 Small, 2 Medium & 1 Flat Screens" },
        medium: { yes: "Use at least: 2 Small & 1 Medium Screens",
                  no: "Use: 2 Small, 1 Medium & 1 Flat Screens" },
        small: { yes: "Use at least: 3 Small Screens",
                 no: "Use: 3 Small & 1 Flat Screens" }
    },
    medium: {
        big: { yes: "Use at least: 1 Medium Screen",
               no: "Use at least: 1 Medium & 1 Flat Screens" },
        medium: { yes: "Use at least: 1 Small & 1 Medium Screens",
                  no: "Use at least: 1 Small, 1 Medium & 1 Flat Screens" },
        small: { yes: "Use at least: 2 Small Screens",
                 no: "Use at least: 2 Small & 1 Flat Screens" }
    },
    bad: {
        big: { yes: "Use at least 1 Large Screen",
               no: "Use at least 1 Large & 1 Flat Screens" },
        medium: { yes: "Use at least: 1 Medium Screen",
                  no: "Use at least: 1 Medium & 1 Flat Screens" },
        small: { yes: "Use at least: 1 Small Screen",
                 no: "Use at least 1 Small & 1 Flat Screens" }
    }
};

function showResult() {
    const recommendation =
        decisionMap[answers.quality][answers.leafSize][answers.movement];

    showDirectResult(recommendation);
}

function showDirectResult(text) {
    step = 4;
    toggleBack(false);

    document.getElementById("question").innerText = "Recommendation";
    document.getElementById("options").innerHTML = "";
    document.getElementById("result").innerText = text;

    const restartBtn = createButton("Restart", "restart", restart);
    document.getElementById("options").appendChild(restartBtn);
}

function setQuestion(questionText, options, callback) {
    document.getElementById("question").innerText = questionText;
    document.getElementById("result").innerText = "";

    const container = document.getElementById("options");
    container.innerHTML = "";

    options.forEach(option => {
        const button = createButton(option.text, option.class, () => callback(option.value));
        container.appendChild(button);
    });
}

function createButton(text, className, onClick) {
    const button = document.createElement("button");
    button.className = "button " + (className || "");
    button.innerText = text;
    button.onclick = onClick;
    return button;
}

function toggleBack(show) {
    document.getElementById("backButton").style.display = show ? "block" : "none";
}

function goBack() {
    if (step === 2) showQualityQuestion();
    else if (step === 3) showLeafSizeQuestion();
}

function restart() {
    answers = {};
    showQualityQuestion();
}

showQualityQuestion();

</script>

</body>
</html>
