<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<title>Shaker Screen Guide</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    padding: 40px;
    position: relative;
}

h1 {
    font-size: 34px;
    margin-bottom: 40px;
}

.back-top {
    position: absolute;
    top: 20px;
    left: 20px;
    padding: 8px 16px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    background-color: #555;
    color: white;
    cursor: pointer;
    display: none;
}

.button-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.button {
    padding: 22px 40px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    min-width: 180px;
    font-weight: bold;
    transition: 0.2s;
}

.button:hover {
    transform: scale(1.05);
}

/* Colors */
.good { background-color: #2ecc71; color: white; }
.medium-quality { background-color: #d2b48c; color: black; }
.bad { background-color: #e74c3c; color: white; }
.mix { background-color: orange; color: white; }

/* Leaf Size Styling */
.big {
    background-color: #1f77b4;
    color: white;
    width: 300px;
    height: 120px;
    font-size: 26px;
}

.medium {
    background-color: #1f77b4;
    color: white;
    width: 240px;
    height: 95px;
    font-size: 20px;
}

.small {
    background-color: #1f77b4;
    color: white;
    width: 200px;
    height: 75px;
    font-size: 16px;
}

.restart { background-color: #333; color: white; }

.result {
    font-size: 38px;
    font-weight: bold;
    margin-top: 40px;
    white-space: pre-line;
}

.yes-btn {
    background-color: #2ecc71;
    color: white;
}

.no-btn {
    background-color: #e74c3c;
    color: white;
}
</style>
</head>

<body>

<button id="backButton" class="back-top" onclick="goBack()">
← Back / Atrás
</button>

<h1 id="question"></h1>
<div id="options" class="button-container"></div>
<div id="result" class="result"></div>

<script>

let answers = {};
let step = 0;

function showQualityQuestion() {
    step = 1;
    toggleBack(false);

    setQuestion(
        "How is the product quality?\n¿Es la calidad del producto buena, media o mala?",
        [
            { text: "Good\nBuena", value: "good", class: "good" },
            { text: "Medium\nMedia", value: "medium", class: "medium-quality" },
            { text: "Bad\nMala", value: "bad", class: "bad" },
            { text: "Good/Bad Mix\nMezcla Buena/Mala", value: "mix", class: "mix" }
        ],
        (value) => {
            if (value === "mix") {
                showDirectResult(
                    "Use 50-50 shaker screen\nUse malla vibratoria 50-50"
                );
                return;
            }
            answers.quality = value;
            showLeafSizeQuestion();
        }
    );
}

function showLeafSizeQuestion() {
    step = 2;
    toggleBack(true);

    setQuestion(
        "Is the leaf size big, medium, or small?\n¿Es el tamaño de la hoja grande, mediana o pequeña?",
        [
            { text: "Big\nGrande", value: "big", class: "big" },
            { text: "Medium\nMediana", value: "medium", class: "medium" },
            { text: "Small\nPequeña", value: "small", class: "small" }
        ],
        (value) => {
            answers.leafSize = value;
            showMovementQuestion();
        }
    );
}

function showMovementQuestion() {
    step = 3;
    toggleBack(true);

    setQuestion(
        "Is the product moving across the shaker bins well?\n¿Se mueve bien el producto a través de los paneles agitadores?",
        [
            { text: "Yes\nSí", value: "yes", class: "yes-btn"},
            { text: "No\nNo", value: "no", class: "no-btn"}
        ],
        (value) => {
            answers.movement = value;
            showResult();
        }
    );
}

const decisionMap = {
    good: {
        big: {
            yes: "Use at least: 1 Small & 2 Medium Screens\nUse al menos: 1 malla pequeña y 2 mallas medianas",
            no: "Use at least: 1 Small, 2 Medium & 1 Flat Screens\nUse al menos: 1 malla pequeñas, 2 medianas y 1 plana"
        },
        medium: {
            yes: "Use at least: 2 Small & 1 Medium Screens\nUse al menos: 2 mallas pequeñas y 1 mediana",
            no: "Use: 2 Small, 1 Medium & 1 Flat Screens\nUse: 2 mallas pequeños, 1 mediana y 1 plana"
        },
        small: {
            yes: "Use at least: 3 Small Screens\nUse al menos: 3 mallas pequeñas",
            no: "Use: 3 Small & 1 Flat Screens\nUtilice: 3 mallas pequeñas y 1 plana"
        }
    },
    medium: {
        big: {
            yes: "Use at least: 1 Medium Screen\nUse al menos: 1 malla mediano",
            no: "Use at least: 1 Medium & 1 Flat Screens\nUse al menos: 1 malla mediana y 1 plana"
        },
        medium: {
            yes: "Use at least: 1 Small & 1 Medium Screens\nUse al menos: 1 malla pequeña y 1 mediana",
            no: "Use at least: 1 Small, 1 Medium & 1 Flat Screens\nUse al menos: 1 malla pequeña, 1 mediana y 1 plana"
        },
        small: {
            yes: "Use at least: 2 Small Screens\nUse al menos: 2 mallas pequeñas",
            no: "Use at least: 2 Small & 1 Flat Screens\nUse al menos: 2 mallas pequeñas y 1 plana"
        }
    },
    bad: {
        big: {
            yes: "Use at least 1 Large Screen\nUse al menos: 1 malla grande",
            no: "Use at least 1 Large & 1 Flat Screens\nUtilice al menos: 1 malla grande y 1 plana"
        },
        medium: {
            yes: "Use at least: 1 Medium Screen\nUse al menos: 1 malla mediana",
            no: "Use at least: 1 Medium & 1 Flat Screens\nUse al menos: 1 malla mediana y 1 plana"
        },
        small: {
            yes: "Use at least: 1 Small Screen\nUse al menos: 1 malla pequeña",
            no: "Use at least 1 Small & 1 Flat Screens\nUtilice al menos: 1 malla pequeña y 1 plana"
        }
    }
};

function showResult() {
    const recommendation =
        decisionMap[answers.quality][answers.leafSize][answers.movement];

    showDirectResult(recommendation);
}

function showDirectResult(text) {
    step = 4;
    toggleBack(false);

    document.getElementById("question").innerText =
        "Recommendation\nRecomendación";

    document.getElementById("options").innerHTML = "";
    document.getElementById("result").innerText = text;

    const restartBtn = createButton(
        "Restart\nReiniciar",
        "restart",
        restart
    );

    document.getElementById("options").appendChild(restartBtn);
}

function setQuestion(questionText, options, callback) {
    document.getElementById("question").innerText = questionText;
    document.getElementById("result").innerText = "";

    const container = document.getElementById("options");
    container.innerHTML = "";

    options.forEach(option => {
        const button = createButton(option.text, option.class, () => callback(option.value));
        container.appendChild(button);
    });
}

function createButton(text, className, onClick) {
    const button = document.createElement("button");
    button.className = "button " + (className || "");
    button.innerText = text;
    button.style.whiteSpace = "pre-line";
    button.onclick = onClick;
    return button;
}

function toggleBack(show) {
    document.getElementById("backButton").style.display = show ? "block" : "none";
}

function goBack() {
    if (step === 2) showQualityQuestion();
    else if (step === 3) showLeafSizeQuestion();
}

function restart() {
    answers = {};
    showQualityQuestion();
}

showQualityQuestion();

</script>

</body>
</html>
